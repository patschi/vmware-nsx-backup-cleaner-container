<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>NSX Backup Cleaner</title>
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78BE20"/>
      <stop offset="100%" stop-color="#1A8A3E"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D3748"/>
      <stop offset="100%" stop-color="#1A202C"/>
    </linearGradient>
    <linearGradient id="diskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#A0AEC0"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="50%" stop-color="#CD853F"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <linearGradient id="bristleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6AD55"/>
      <stop offset="100%" stop-color="#C05621"/>
    </linearGradient>
  </defs>

  <!-- NSX-inspired hexagon frame -->
  <polygon points="256,28 460,144 460,368 256,484 52,368 52,144"
           fill="none" stroke="url(#hexGrad)" stroke-width="10" stroke-linejoin="round"/>

  <!-- Subtle inner hex (network virtualization hint) -->
  <polygon points="256,68 425,164 425,348 256,444 87,348 87,164"
           fill="none" stroke="#78BE20" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.5"/>

  <!-- Network nodes in corners (NSX network virtualization) -->
  <g fill="#78BE20" opacity="0.85">
    <circle cx="256" cy="28" r="6"/>
    <circle cx="460" cy="144" r="6"/>
    <circle cx="460" cy="368" r="6"/>
    <circle cx="256" cy="484" r="6"/>
    <circle cx="52" cy="368" r="6"/>
    <circle cx="52" cy="144" r="6"/>
  </g>

  <!-- Connecting network lines (faint) -->
  <g stroke="#78BE20" stroke-width="1" opacity="0.25" fill="none">
    <line x1="256" y1="28" x2="460" y2="368"/>
    <line x1="460" y1="144" x2="52" y2="368"/>
    <line x1="256" y1="484" x2="52" y2="144"/>
  </g>

  <!-- Container outline (Docker-style box) -->
  <g stroke="url(#containerGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left bracket -->
    <path d="M 138 200 L 118 200 L 118 360 L 138 360"/>
    <!-- Right bracket -->
    <path d="M 374 200 L 394 200 L 394 360 L 374 360"/>
  </g>

  <!-- Container "ship" detail dots on top brackets -->
  <g fill="#4A5568">
    <circle cx="118" cy="195" r="3"/>
    <circle cx="394" cy="195" r="3"/>
  </g>

  <!-- Stacked backup disks (oldest at bottom, being cleaned up) -->
  <!-- Bottom disk - newest, kept -->
  <g transform="translate(256, 340)">
    <ellipse cx="0" cy="0" rx="80" ry="14" fill="url(#diskGrad)"/>
    <rect x="-80" y="0" width="160" height="20" fill="#A0AEC0"/>
    <ellipse cx="0" cy="20" rx="80" ry="14" fill="#718096"/>
    <!-- Label band -->
    <rect x="-60" y="6" width="120" height="6" fill="#1A8A3E" opacity="0.8"/>
  </g>

  <!-- Middle disk - newer -->
  <g transform="translate(256, 300)">
    <ellipse cx="0" cy="0" rx="80" ry="14" fill="url(#diskGrad)"/>
    <rect x="-80" y="0" width="160" height="20" fill="#A0AEC0"/>
    <ellipse cx="0" cy="20" rx="80" ry="14" fill="#718096"/>
    <rect x="-60" y="6" width="120" height="6" fill="#1A8A3E" opacity="0.6"/>
  </g>

  <!-- Top disk - being swept away (rotated, faded, displaced) -->
  <g transform="translate(330, 230) rotate(22)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="70" ry="12" fill="#CBD5E0"/>
    <rect x="-70" y="0" width="140" height="16" fill="#A0AEC0"/>
    <ellipse cx="0" cy="16" rx="70" ry="12" fill="#718096"/>
    <rect x="-50" y="5" width="100" height="5" fill="#E53E3E" opacity="0.7"/>
  </g>

  <!-- Dust/particles from swept disk -->
  <g fill="#78BE20" opacity="0.7">
    <circle cx="415" cy="215" r="3"/>
    <circle cx="430" cy="235" r="2.5"/>
    <circle cx="410" cy="245" r="2"/>
    <circle cx="440" cy="220" r="2"/>
    <circle cx="425" cy="260" r="2.5"/>
    <circle cx="445" cy="250" r="1.5"/>
  </g>

  <!-- Broom -->
  <g transform="translate(180, 180) rotate(-35)">
    <!-- Handle -->
    <rect x="-6" y="-110" width="12" height="140" fill="url(#handleGrad)" rx="6"/>
    <!-- Handle tip cap -->
    <ellipse cx="0" cy="-110" rx="6" ry="3" fill="#5C2E0F"/>
    <!-- Binding wire -->
    <rect x="-22" y="28" width="44" height="6" fill="#4A5568" rx="2"/>
    <rect x="-22" y="38" width="44" height="3" fill="#2D3748" rx="1"/>
    <!-- Bristle head trapezoid -->
    <path d="M -22 42 L 22 42 L 34 90 L -34 90 Z" fill="url(#bristleGrad)"/>
    <!-- Individual bristle strands -->
    <g stroke="#7B341E" stroke-width="1.5" stroke-linecap="round">
      <line x1="-28" y1="68" x2="-31" y2="100"/>
      <line x1="-18" y1="68" x2="-19" y2="102"/>
      <line x1="-9" y1="68" x2="-9" y2="104"/>
      <line x1="0" y1="68" x2="0" y2="105"/>
      <line x1="9" y1="68" x2="9" y2="104"/>
      <line x1="18" y1="68" x2="19" y2="102"/>
      <line x1="28" y1="68" x2="31" y2="100"/>
    </g>
  </g>

  <!-- Sweep motion arc -->
  <path d="M 215 250 Q 280 215 360 230"
        fill="none" stroke="#78BE20" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="2 8" opacity="0.6"/>
</svg>
