# Prevent duplicate pipelines when a branch push also has an open MR:
# run the MR pipeline, skip the redundant branch pipeline.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

variables:
  SECRET_DETECTION_ENABLED: "true"
  GITLAB_ADVANCED_SAST_ENABLED: "true"
  CI_APPLICATION_REPOSITORY: "$CI_REGISTRY_IMAGE"
  CI_APPLICATION_TAG: "latest"
  GHCR_IMAGE: "ghcr.io/patschi/vmware-nsx-backup-cleaner-container"
  GITHUB_PROJECT_URL: "https://github.com/patschi/vmware-nsx-backup-cleaner-container"
  # Exclude the vendor cleanup script and the test suite from SAST.
  # vendor-scripts/ is VMware-supplied code that must not be modified,
  # so any SAST findings there are not actionable. tests/ uses mock +
  # Popen patterns SAST tends to flag without value.
  SAST_EXCLUDED_PATHS: "vendor-scripts, tests"
  # uv version used in all lint jobs. Renovate tracks this as the same
  # ghcr.io/astral-sh/uv Docker dep as the Dockerfile COPY --from line
  # (see customManagers in renovate.json), so both values are structurally
  # guaranteed to update together in one atomic PR - there is no code
  # path that can update them separately.
  UV_VERSION: "0.11.14"
  # ruff version used in lint jobs. Renovate tracks this via PyPI.
  RUFF_VERSION: "0.15.14"

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

# Ensure container scanning targets the image just built, not a potentially stale latest.
# optional: true allows the job to run on scheduled pipelines even when
# push-container-gitlab is skipped (it will scan the existing :latest image).
# Override the template's default stage (`test`) so this job runs AFTER
# the image is pushed - otherwise GitLab rejects the `needs` reference as
# pointing to a later stage.
container_scanning:
  stage: scan-container
  needs:
    - job: push-container-gitlab
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      changes:
        - "**/*.py"
        - "Dockerfile"
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
      when: always
    - when: never

# Run dependency scanning on scheduled pipelines in addition to pyproject.toml/uv.lock changes
gemnasium-python-dependency_scanning:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      changes:
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
      when: always
    - when: never

stages:
  - lint
  - test
  - build-container
  # scan-container runs after the container is built and pushed so
  # container_scanning can `needs` the just-built image. Keeping it as a
  # dedicated post-build stage lets pytest (in `test`) gate the build
  # without delaying the scan into pytest's pipeline slot.
  - scan-container

# Shared base for all lint jobs: pinned Python image, uv install, and uv cache.
# Child jobs reference this before_script with !reference so they can append
# their own steps without losing the uv bootstrap.
# UV_CACHE_DIR points uv to the GitLab CI cache directory so tool downloads
# survive between pipeline runs. UV_NO_PROGRESS suppresses the progress bar.
.uv-base:
  image: python:3.13-slim-trixie@sha256:b04b5d7233d2ad9c379e22ea8927cd1378cd15c60d4ef876c065b25ea8fb3bf3
  variables:
    UV_CACHE_DIR: .uv-cache
    UV_NO_PROGRESS: "1"
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths:
      - .uv-cache/
  before_script:
    - pip install --quiet --root-user-action=ignore uv==${UV_VERSION} --cache-dir .uv-cache

# Shared base for ruff lint jobs: extends uv-base and declares the shared trigger
# rules so check and format stay in sync without repetition.
# ruff is invoked via uvx (uv's tool executor) - no explicit install step needed.
# uvx caches the tool in UV_CACHE_DIR so repeated calls across jobs are fast.
.ruff-base:
  extends: .uv-base
  stage: lint
  interruptible: true
  before_script:
    - !reference [.uv-base, before_script]
  rules:
    - changes:
        - "**/*.py"
        - "pyproject.toml"
        - ".gitlab-ci.yml"
      when: always
    - when: never

# Lint only the wrapper. vendor-scripts/nsx_backup_cleaner.py is vendor code
# (copied verbatim from VMware's NSX Manager appliance) and is
# intentionally excluded from lint checks.
lint-ruff-check:
  extends: .ruff-base
  script:
    # Generate GitLab Code Quality report (inline MR diff annotations)
    - uvx ruff@${RUFF_VERSION} check --output-format=gitlab entrypoint.py > ruff-report.json || true
    # This is the call that actually fails the job on lint errors
    - uvx ruff@${RUFF_VERSION} check entrypoint.py
  artifacts:
    reports:
      codequality: ruff-report.json
    when: always

lint-ruff-format:
  extends: .ruff-base
  script:
    - uvx ruff@${RUFF_VERSION} format --check entrypoint.py

# Run the pytest suite against entrypoint.py. uv sync installs both the
# runtime dep (croniter) and the dev dep (pytest) from the pinned lockfile.
# Tests deliberately do not exercise vendor-scripts/nsx_backup_cleaner.py since
# that file is vendor code we cannot modify in response to test failures.
test-pytest:
  extends: .uv-base
  stage: test
  interruptible: true
  before_script:
    - !reference [.uv-base, before_script]
  script:
    - uv sync --frozen
    - uv run pytest --junitxml=pytest-report.xml
  artifacts:
    when: always
    reports:
      junit: pytest-report.xml
  rules:
    - changes:
        - "**/*.py"
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
      when: always
    - when: never

# Audits pinned deps against OSV/PyPI Advisory databases.
# Runs on pyproject.toml/uv.lock changes and on scheduled pipelines (nightly CVE discovery).
# Configure the schedule in GitLab UI -> CI/CD -> Schedules.
# uv audit reads uv.lock directly - no separate resolution step needed.
lint-uv-audit:
  extends: .uv-base
  stage: lint
  interruptible: true
  allow_failure: true
  before_script:
    - !reference [.uv-base, before_script]
  script:
    - uv audit
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - unknown_failure
  rules:
    # Always run on scheduled pipelines (e.g. nightly) for CVE discovery
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - changes:
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
      when: always
    - when: never

# Push container to GitLab Container Registry
push-container-gitlab:
  stage: build-container
  interruptible: true
  image:
    name: martizih/kaniko:v1.27.5-debug@sha256:6f2a60489f03ce7ab78240c82c27358cfa394cfa7b91ee6b0bb72fc66f21c520
    entrypoint: [""]
  variables:
    FF_KANIKO_OCI_STAGES: 'true'
  before_script: []
  script:
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"$(echo -n $CI_DEPENDENCY_PROXY_SERVER | awk -F[:] '{print $1}')\":{\"auth\":\"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    # Parse BASE_VERSION from pyproject.toml - the single source of truth for the version number.
    # awk splits on " and prints the second field from the matching line, e.g. "0.1.0" -> 0.1.0.
    - BASE_VERSION=$(awk -F'"' '/^version[[:space:]]*=/{print $2; exit}' pyproject.toml)
    - >
      /kaniko/executor
      --cache=false
      --registry-mirror=mirror.gcr.io
      --compression=zstd
      --compression-level=1
      --compressed-caching=true
      --single-snapshot
      --annotation="org.opencontainers.image.title=$CI_PROJECT_NAME"
      --annotation="org.opencontainers.image.version=${BASE_VERSION}+${CI_COMMIT_SHORT_SHA}"
      --annotation="org.opencontainers.image.source=$CI_PROJECT_URL"
      --annotation="org.opencontainers.image.revision=$CI_COMMIT_SHA"
      --annotation="org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      --annotation="org.opencontainers.image.description=$CI_PROJECT_DESCRIPTION"
      --annotation="org.opencontainers.image.licenses=GPLv3"
      --build-arg="BASE_VERSION=${BASE_VERSION}"
      --build-arg="GIT_HASH=${CI_COMMIT_SHORT_SHA}"
      --context="$CI_PROJECT_DIR"
      --dockerfile="$CI_PROJECT_DIR/Dockerfile"
      --destination="$CI_REGISTRY_IMAGE:$CI_APPLICATION_TAG"
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - unknown_failure
  rules:
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      changes:
        - "**/*.py"
        - "Dockerfile"
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
        - "vendor-scripts/**"
      when: always
    - when: never

# Copy container from GitLab to GitHub Container Registry, adding GitHub-specific label
push-container-ghcr:
  stage: build-container
  image:
    name: gcr.io/go-containerregistry/crane:debug@sha256:22de5fee4326edae01a568c5a53b69c755901c5f5aa1c06a7c907bef18937356
    entrypoint: [""]
  needs:
    - job: push-container-gitlab
      optional: true
  before_script: []
  script:
    - mkdir -p /root/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"},\"ghcr.io\":{\"auth\":\"$(printf "%s:%s" "${GHCR_USER}" "${GHCR_TOKEN}" | base64 | tr -d '\n')\"}}}" > /root/.docker/config.json
    - >
      crane mutate
      --label="org.opencontainers.image.source=$GITHUB_PROJECT_URL"
      --tag="$GHCR_IMAGE:$CI_APPLICATION_TAG"
      "$CI_REGISTRY_IMAGE:$CI_APPLICATION_TAG"
  # Mirror push-container-gitlab's rules so ghcr only runs when the gitlab
  # push job actually produced an image. Without this, ghcr ran on every
  # pipeline (e.g. MR pipelines) and the hard `needs` reference to a skipped
  # job caused: "needs 'push-container-gitlab', but ... does not exist in the pipeline".
  rules:
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      changes:
        - "**/*.py"
        - "Dockerfile"
        - "pyproject.toml"
        - "uv.lock"
        - ".gitlab-ci.yml"
        - "vendor-scripts/**"
      when: always
    - when: never
